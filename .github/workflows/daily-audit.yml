name: Daily Self-Audit (open-source)

# Auto-audit quotidien de CE repository avec des scanners 100 % open-source.
# Remplace l'ancien pipeline basé sur Claude Code / ANTHROPIC_API_KEY (supprimé,
# surcoût non souhaité). Produit un rapport Markdown en artefact, sans clé payante.

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable

      - name: Build du moteur d'audit
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter @agentic-hub/shared build
          pnpm --filter @agentic-hub/audit-engine build

      - name: Installer les scanners
        run: |
          pip install semgrep
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
          curl -sSL -o osv-scanner "https://github.com/google/osv-scanner/releases/download/v1.9.1/osv-scanner_linux_amd64"
          sudo install osv-scanner /usr/local/bin/osv-scanner
          npm install -g eslint@9 @eslint/js@9 jscpd@4 dependency-cruiser@16 madge@8

      - name: Lancer l'audit
        run: bash scripts/run-audit.sh

      - name: Publier les rapports
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: reports/
